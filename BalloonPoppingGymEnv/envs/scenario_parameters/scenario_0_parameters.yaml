# Scenario metadata
scenario:
  number: 0
  random_seed: 0 # Use null to enable random seeding

# Launch site and atmosphere setup
environment:
  date: [2025, 7, 26, 0]
  latitude: 22.1749259
  longitude: 120.8922531
  elevation: 20.0
  use_standard_atmosphere: true
  atmosphere_data_path: ""

# Simulation timing configuration
simulation:
  time_step: 0.01
  max_time: 100

# Balloon model and uncertainty parameters
balloon:
  release_interval: 1 # no actual effect in scenario 0
  num: 10
  radius: 1.5
  mass: 0.8
  inertia: [1, 1, 1]
  aero_coefficients:
    cL: 0.0
    cQ: 0.0
    cD: 1.0
    moment_damping: -0.01
  stochastic:
    latitude_std: 0.001
    longitude_std: 0.001
    mass_std: 0.2
    volume_std: 0.5
    inertia_std: 0.1

# Rocket model parameters
rocket:
  tank:
    liquid: HTP
    liquid_density: 1390
    gas: N2
    gas_density: 68
    radius: 0.133
    height: 0.83
    flux_time: 30
    initial_liquid_mass: 13.9
    initial_gas_mass: 2.13
    liquid_mass_flow_rate_out: 0.425
  motor:
    thrust_source: 1080
    dry_mass: 0
    dry_inertia: [0, 0, 0]
    center_of_dry_mass_position: 0.15
    burn_time: 30
    grain_number: 1
    grain_separation: 0
    grain_outer_radius: 0.0843
    grain_initial_inner_radius: 0.0295
    grain_initial_height: 0.2757
    grain_density: 900
    nozzle_radius: 0.04425
    throat_radius: 0.023
    nozzle_position: 0
    grains_center_of_mass_position: 0.13785
    motor_position: -1.5925
  rocket_body:
    radius: 0.22
    mass: 80
    inertia: [26.54, 26.38, 1.6312]
    center_of_mass_without_motor: -0.88
    power_off_drag: 0.25
    power_on_drag: 0.25
    volume: null
  nose:
    length: 1
    kind: vonKarman
    position: 0.5
  fins:
    useFins: true
    n: 4
    span: 0.4
    root_chord: 0.5
    tip_chord: 0.2
    position: -1.0
  sensors:
    sampling_rate: 100
    gyro_position: -0.9
    gyro_noise_density: 0.0
    gyro_random_walk_density: 0.0
    gyro_constant_bias: 0.0
    accelerometer_position: -0.9
    accelerometer_noise_density: 0.0
    accelerometer_random_walk_density: 0.0
    accelerometer_constant_bias: 0.0
    gnss_position: 0
    gnss_position_accuracy: 0.0
    gnss_altitude_accuracy: 0.0
    gnss_velocity_accuracy: 0.0
  control:
    control_frequency: 100
    tvc_gimbal_range: 15
    max_roll_torque: 10
    throttle_range: [0.0, 1.0]
